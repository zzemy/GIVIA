name: Code Quality

# ============================================================================
# Code Quality & Security Checks
# ============================================================================
# Runs ESLint, TypeScript type checking, and security audits.
# This workflow works OUT-OF-THE-BOX without requiring any secrets.
# ============================================================================

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_call:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display CI/CD Configuration
        shell: bash
        run: |
          echo "## 🔧 CI/CD Configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Optional Features Status:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "⚪ All optional integrations are **DISABLED** by default" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Optional features (currently disabled):" >> "$GITHUB_STEP_SUMMARY"
          echo "- Codecov integration" >> "$GITHUB_STEP_SUMMARY"
          echo "- Vercel deployments" >> "$GITHUB_STEP_SUMMARY"
          echo "- macOS code signing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Windows code signing" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "ℹ️ To enable optional features:" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Add the required secrets to your GitHub repository" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Uncomment the relevant sections in the workflow files" >> "$GITHUB_STEP_SUMMARY"
          echo "3. See \`CI_CD.md\` for detailed setup instructions" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint
        continue-on-error: true

      - name: TypeScript type checking
        run: pnpm exec tsc --noEmit

      - name: Security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated dependencies
        run: pnpm outdated
        continue-on-error: true
